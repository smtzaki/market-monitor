name: Market Scan

# Cron is in UTC. Runs every 15 min from 13:00–20:45 UTC, Mon–Fri.
# This covers US market hours (9:30–16:00 ET) in both EST (UTC-5) and EDT (UTC-4),
# with a buffer on either side so we catch FX/tile data before & after the bell.
# Note: GitHub Actions cron is best-effort — schedules can drift 5–15 min during
# high-load periods. Acceptable for a 15-min-cadence scanner.

on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:  # manual trigger from GitHub UI for testing

permissions:
  contents: write     # needed to commit data/ updates back to the repo

# Prevent overlap if a run is slow — newer one waits, doesn't pile up.
concurrency:
  group: market-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd scanner
          python scan.py

      - name: Update positions (process actions, refresh prices, check exits)
        run: |
          cd scanner
          python positions.py

      - name: Generate recommendations
        run: |
          cd scanner
          python recommender.py

      - name: Commit data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No data changes to commit."
          fi
