name: Forward Returns

# Runs once per weekday at 21:45 UTC.
# That's 5:45 PM EDT / 4:45 PM EST — safely after US market close (16:00 ET),
# with enough buffer that yfinance has end-of-day prices indexed.

on:
  schedule:
    - cron: '45 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: forward-returns
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update forward returns + stats
        run: |
          cd scanner
          python update_returns.py

      - name: Commit data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "returns: $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No return updates to commit."
          fi
