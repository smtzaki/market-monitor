name: Historical Backfill

# Manual trigger only — no cron. Run when you want to refresh the historical
# data (initial population, quarterly refresh, after universe changes, etc.).
#
# This downloads ~2 years of daily OHLCV for the entire universe, computes
# per-ticker baselines, and commits both back to the repo.
# Takes ~3-5 minutes for ~125 tickers.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price backfill
        run: |
          cd scanner
          python backfill.py

      - name: Run regime backfill on signal log
        run: |
          cd scanner
          python backfill_regimes.py

      - name: Commit historical data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical_prices.db data/historical_baselines.json data/signal_log.json
          if ! git diff --staged --quiet; then
            git commit -m "backfill: historical data + regime tags $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit."
          fi
